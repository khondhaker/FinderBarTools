name: FinderBarTools
options:
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.momin.finderbartools
    SWIFT_VERSION: "5.0"
targets:
  FinderBarTools:
    type: application
    platform: macOS
    sources:
      - path: Sources/FinderBarTools
      - path: Resources/Assets.xcassets
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: FinderBarTools
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets: []
